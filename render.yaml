services:
  - type: web
    name: hitster-digital
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: BASE_URL
        sync: false        # ex: https://hitster-digital.onrender.com
      - key: JOIN_URL
        sync: false        # opcional: dominio curto para jogadores, ex https://hitster.page
      - key: SPOTIFY_CLIENT_ID
        sync: false
      - key: SPOTIFY_CLIENT_SECRET
        sync: false
      - key: YT_API_KEY
        sync: false
