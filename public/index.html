<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster Digital</title>
<link rel="stylesheet" href="/base.css">
<style>
  body { display: grid; place-items: center; min-height: 100vh; padding: 24px; }
  .wrap { text-align: center; max-width: 560px; }
  .vinyl { --size: 220px; margin: 0 auto 34px; }
  h1 { font-size: clamp(2rem, 6vw, 3.2rem); font-weight: 900; }
  h1 span { color: var(--gold); }
  p.lead { color: var(--cream-dim); margin: 14px 0 34px; font-size: 1.05rem; }
  .actions { display: grid; gap: 14px; }
  .actions a { text-decoration: none; }
  .actions .btn-gold, .actions .btn-ghost { width: 100%; display: block; font-size: 1.1rem; }
  .join { display: flex; gap: 10px; margin-top: 6px; }
  .join input { text-transform: uppercase; text-align: center; font-family: var(--font-num); font-size: 1.2rem; letter-spacing: .2em; }
</style>
</head>
<body>
<main class="wrap">
  <div class="vinyl paused" aria-hidden="true"></div>
  <h1>HITSTER <span>DIGITAL</span></h1>
  <p class="lead">A TV e o palco, o celular e o seu controle. Ouca o trecho, adivinhe a epoca e monte sua linha do tempo musical.</p>
  <div class="actions">
    <a href="/tv"><button class="btn-gold">Abrir na TV e criar sala</button></a>
    <form class="join" onsubmit="event.preventDefault(); const c=this.code.value.trim(); if(c) location.href='/play?sala='+encodeURIComponent(c.toUpperCase());">
      <input name="code" placeholder="CODIGO" maxlength="6" aria-label="Codigo da sala" autocomplete="off">
      <button class="btn-ghost" type="submit">Entrar</button>
    </form>
  </div>
</main>
</body>
</html>
