<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Hitster Digital</title>
<meta name="description" content="Hitster Digital: a TV toca, o celular e o controle. Monte sua linha do tempo musical com os amigos.">
<link rel="stylesheet" href="/base.css">
<style>
  body { display: grid; place-items: center; min-height: 100vh; min-height: 100dvh; padding: 24px; }
  .wrap { text-align: center; max-width: 480px; width: 100%; }
  .vinyl { --size: 150px; margin: 0 auto 26px; }
  h1 { font-size: clamp(1.7rem, 6vw, 2.6rem); font-weight: 900; }
  h1 span { color: var(--gold); }
  /* entrada estilo kahoot.it: o codigo e a acao principal */
  .pin-card {
    background: var(--ink-2); border-radius: 22px; padding: 26px;
    margin: 28px 0 18px; box-shadow: 0 18px 50px rgba(0,0,0,.45);
  }
  .pin-card label { display: block; font-size: .85rem; color: var(--cream-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .1em; }
  .pin-card input {
    text-transform: uppercase; text-align: center;
    font-family: var(--font-num); font-size: 2rem; font-weight: 700;
    letter-spacing: .35em; padding: 16px; border-color: rgba(232,184,75,.4);
  }
  .pin-card input::placeholder { letter-spacing: .2em; font-size: 1.2rem; opacity: .4; }
  .pin-card button { width: 100%; margin-top: 14px; font-size: 1.15rem; padding: 16px; }
  .host-link { color: var(--cream-dim); font-size: .95rem; }
  .host-link a { color: var(--gold); font-weight: 700; }
</style>
</head>
<body>
<main class="wrap">
  <div class="vinyl paused" aria-hidden="true"></div>
  <h1>HITSTER <span>DIGITAL</span></h1>

  <form class="pin-card" onsubmit="event.preventDefault(); const c=this.code.value.replace(/[^a-z0-9]/gi,''); if(c) location.href='/'+c.toUpperCase();">
    <label for="pin">Codigo da sala</label>
    <input id="pin" name="code" placeholder="CODIGO" maxlength="6" autocomplete="off"
           autocapitalize="characters" inputmode="text" autofocus aria-label="Codigo da sala">
    <button class="btn-gold" type="submit">Entrar no jogo</button>
  </form>

  <p class="host-link">Vai ser o host? <a href="/tv">Abra na TV e crie a sala</a></p>
</main>
</body>
</html>
