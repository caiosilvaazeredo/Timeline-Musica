<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Vitrola</title>
<meta name="description" content="Vitrola: a TV toca, o celular e o controle. Monte sua linha do tempo musical com os amigos.">
<link rel="stylesheet" href="/base.css?v=6afb4e41">
<style>
  body { display: grid; place-items: center; min-height: 100vh; min-height: 100dvh; padding: 24px; }
  .wrap { text-align: center; max-width: 480px; width: 100%; }
  .vinyl { --size: 130px; margin: 0 auto 22px; }
  h1 { font-size: clamp(1.7rem, 6vw, 2.6rem); font-weight: 900; }

  .pin-card {
    background: var(--ink-2); border-radius: 22px; padding: 24px;
    margin: 24px 0 16px; box-shadow: 0 18px 50px rgba(0,0,0,.45);
  }
  .pin-card label { display: block; font-size: .85rem; color: var(--cream-dim); margin-bottom: 10px; text-transform: uppercase; letter-spacing: .1em; }
  .pin-card input {
    text-transform: uppercase; text-align: center;
    font-family: var(--font-num); font-size: 1.9rem; font-weight: 700;
    letter-spacing: .32em; padding: 15px; border-color: rgba(240,190,78,.4);
  }
  .pin-card input::placeholder { letter-spacing: .18em; font-size: 1.1rem; opacity: .4; }
  .pin-card button { width: 100%; margin-top: 14px; font-size: 1.1rem; padding: 15px; }

  .divider { display: flex; align-items: center; gap: 12px; color: var(--cream-dim); font-size: .8rem; margin: 20px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: rgba(244,232,207,.15); }

  .public-box { text-align: left; margin-bottom: 20px; }
  .public-list { display: grid; gap: 8px; }
  .room-row {
    display: flex; align-items: center; gap: 10px;
    background: var(--ink-2); border-radius: 12px; padding: 10px 14px;
    border: 1px solid rgba(244,232,207,.06); cursor: pointer; text-align: left;
    width: 100%; color: var(--cream); font-family: var(--font-body);
  }
  .room-row:hover { border-color: var(--gold); }
  .room-row .rc { font-family: var(--font-num); font-weight: 700; color: var(--gold); letter-spacing: .15em; }
  .room-row .rmodo { font-size: .78rem; color: var(--cream-dim); }
  .room-row .rcount { margin-left: auto; font-size: .85rem; color: var(--ok); font-family: var(--font-num); }
  .public-empty { color: var(--cream-dim); font-size: .85rem; text-align: center; padding: 14px; }

  .host-link { color: var(--cream-dim); font-size: .95rem; }
  .host-link a { color: var(--gold); font-weight: 700; text-decoration: none; }
</style>
</head>
<body>
<main class="wrap">
  <div class="vinyl paused" aria-hidden="true"></div>
  <h1>VITROLA</h1>

  <form class="pin-card" id="pin-form">
    <label for="pin">Codigo da sala</label>
    <input id="pin" name="code" placeholder="CODIGO" maxlength="6" autocomplete="off"
           autocapitalize="characters" inputmode="text" autofocus aria-label="Codigo da sala">
    <button class="btn-gold" type="submit">Entrar no jogo</button>
  </form>

  <div class="divider">ou escolha uma sala aberta</div>

  <div class="public-box">
    <div id="public-list" class="public-list">
      <p class="public-empty">Procurando salas publicas...</p>
    </div>
  </div>

  <p class="host-link">Vai ser o host? <a href="/tv">Abra na TV e crie a sala</a></p>
  <form class="screen-link" onsubmit="event.preventDefault(); const c=this.tela.value.replace(/[^a-z0-9]/gi,''); if(c) location.href='/tv?tela='+c.toUpperCase();">
    <span>Conectar outra tela (espelho):</span>
    <input name="tela" maxlength="6" placeholder="CODIGO DE TELA" aria-label="Codigo de tela" autocomplete="off">
    <button class="btn-ghost" type="submit">Conectar</button>
  </form>
</main>

<script>
  document.getElementById('pin-form').addEventListener('submit', (e) => {
    e.preventDefault();
    const c = e.target.code.value.replace(/[^a-z0-9]/gi, '');
    if (c) location.href = '/' + c.toUpperCase();
  });

  const MODO_LABEL = { ORIGINAL: 'Original', PRO: 'PRO', EXPERT: 'Expert', EQUIPES: 'Equipes' };

  async function loadPublicRooms() {
    try {
      const rooms = await (await fetch('/api/rooms/public')).json();
      const box = document.getElementById('public-list');
      if (!rooms.length) {
        box.innerHTML = '<p class="public-empty">Nenhuma sala publica agora. Que tal criar a sua?</p>';
        return;
      }
      box.innerHTML = rooms.map(r => `
        <button class="room-row" data-code="${r.code}">
          <span class="rc">${r.code}</span>
          <span class="rmodo">${MODO_LABEL[r.modo] || r.modo} &middot; meta ${r.meta}</span>
          <span class="rcount">${r.players}/${r.max}</span>
        </button>`).join('');
      box.querySelectorAll('.room-row').forEach(b =>
        b.addEventListener('click', () => location.href = '/' + b.dataset.code));
    } catch (e) { /* mantem a ultima lista exibida em caso de falha temporaria */ }
  }
  loadPublicRooms();
  setInterval(loadPublicRooms, 4000);
</script>
<script src="/fx.js?v=6afb4e41"></script>
</body>
</html>
<style>
.screen-link { margin-top: 18px; display: flex; gap: 8px; align-items: center; justify-content: center; flex-wrap: wrap; color: var(--cream-dim); font-size: .9rem; }
.screen-link input { max-width: 170px; text-transform: uppercase; text-align: center; font-family: var(--font-num); letter-spacing: .12em; padding: 10px; }
.screen-link button { padding: 10px 16px; font-size: .85rem; }
</style>
